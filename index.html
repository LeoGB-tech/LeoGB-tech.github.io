<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHUM — L'Écosystème Gaming Ultime</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9d4edd;
            --secondary: #5a189a;
            --accent: #ff00ff;
            --bg: #0a0612;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #231446, transparent),
                        radial-gradient(circle at bottom left, #100a25, transparent);
        }

        h1, h2, .logo { font-family: 'Space Grotesk', sans-serif; }

        nav {
            padding: 2rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 100;
        }

        .logo { font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; color: var(--primary); }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .badge {
            background: var(--glass);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff, #9d4edd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            max-width: 800px;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn {
            padding: 18px 45px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            font-size: 1.1rem;
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(157, 78, 221, 0.5);
            background: #b062ff;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 100px 10%;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            transition: all 0.4s;
        }

        .card:hover { 
            border-color: var(--primary);
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.08);
        }

        .card h3 { margin-bottom: 15px; color: var(--primary); font-size: 1.5rem; }

        .code-access {
            text-align: center;
            padding: 100px 10%;
            background: linear-gradient(to bottom, transparent, rgba(157, 78, 221, 0.05));
        }

        .email-link { color: var(--accent); text-decoration: none; font-weight: bold; }

        footer {
            padding: 60px;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            border-top: 1px solid var(--border);
        }
